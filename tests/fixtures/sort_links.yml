custom_link_types:
  conf: |
    extensions = ["sphinx_needs"]
    version = "1.0"
    needs_build_json = True
    needs_builder_filter = "True"
    needs_extra_links = [
        {"option": "implements", "incoming": "implemented by", "outgoing": "implements"},
        {"option": "derives", "incoming": "derived by", "outgoing": "derives from"},
    ]
  rst: |
    Custom Link Types Test
    ======================

    .. req:: REQ A
        :id: REQ_A

    .. req:: REQ B
        :id: REQ_B

    .. req:: REQ C
        :id: REQ_C

    .. spec:: SPEC 1
        :id: SPEC_1
        :implements: REQ_C, REQ_A, REQ_B
        :derives: REQ_B, REQ_A
