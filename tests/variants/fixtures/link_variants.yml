    [needs.links.links]
    outgoing = "links"
    incoming = "linked by"
    parse_variants = true
  rst: |
    .. spec:: Spec A
        :id: SPEC_1

    .. spec:: Spec B
        :id: SPEC_2

    .. impl:: Implementation
        :id: IMPL_1
        :assignee: Alice
        :links: <<[assignee == 'Alice']:SPEC_1, SPEC_2>>, <<[assignee == 'Bob']:SPEC_1, SPEC_2>>
