variant_resolve_match:
  conf: |
    extensions = ["sphinx_needs"]
    needs_from_toml = "ubproject.toml"
  ubproject: |
    [needs.fields.assignee]
    nullable = true

    [needs.links.links]
    outgoing = "links"
    incoming = "linked by"
    parse_variants = true
  rst: |
    .. spec:: Spec A
        :id: SPEC_1

    .. spec:: Spec B
        :id: SPEC_2

    .. impl:: Implementation
        :id: IMPL_1
        :assignee: Alice
        :links: <<[assignee == 'Alice']:SPEC_1, SPEC_2>>
  expect:
    IMPL_1:
      assignee: Alice
      links:
        - SPEC_1

