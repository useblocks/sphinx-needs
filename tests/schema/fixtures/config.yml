ref_error:
  conf: |
    extensions = ["sphinx_needs"]
    needs_schemas_from_json = "schemas.json"
  rst: |
    .. impl:: title
        :id: IMPL_1
  schemas:
    $defs:
      type-impl:
        properties:
          type:
            const: impl
    schemas:
      - validate:
          local:
            $ref: "#/$defs/not-exist"
  exception:
    - "Reference 'not-exist' not found in definitions"

ref_mixed_error:
  conf: |
    extensions = ["sphinx_needs"]
    needs_schemas_from_json = "schemas.json"
  rst: |
    .. impl:: title
        :id: IMPL_1
  schemas:
    $defs:
      type-impl:
        properties:
          type:
            const: impl
    schemas:
      - validate:
          local:
            $ref: "#/$defs/not-exist"
            required: [type]
  exception:
    - "Invalid $ref entry, expected a single $ref key"
    - "{'$ref': '#/$defs/not-exist', 'required': ['type']}"
