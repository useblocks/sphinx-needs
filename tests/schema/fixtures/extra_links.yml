pattern:
  conf: |
    extensions = ["sphinx_needs"]
    needs_from_toml = "ubproject.toml"
    needs_schemas_from_json = "schemas.json"
  ubproject: |
    [[needs.extra_links]]
    option = "links"
    outgoing = "links"
    incoming = "linked by"
    schema.type = "array"
    schema.items = { type = "string", pattern = "^[A-Z0-9_]{3,}" }
    schema.minItems = 1
  rst: |
    .. spec:: title
        :id: SPEC_1

    .. impl:: title
        :id: IMPL_1
        :links: SPEC_1
  schemas:
    schemas:
      - select:
          properties:
            type: {const: "impl"}
        validate:
          local:
            required: ["links"]
  warnings: []

pattern_error:
  conf: |
    extensions = ["sphinx_needs"]
    needs_from_toml = "ubproject.toml"
    needs_schemas_from_json = "schemas.json"
  ubproject: |
    [[needs.extra_links]]
    option = "links"
    outgoing = "links"
    incoming = "linked by"
    schema.type = "array"
    schema.items = { type = "string", pattern = "^[A-Z0-9_]{10,}" }
    schema.minItems = 1
  rst: |
    .. spec:: title
        :id: SPEC_1

    .. impl:: title
        :id: IMPL_1
        :links: SPEC_1
  schemas:
    schemas:
      - select:
          properties:
            type: {const: "impl"}
        validate:
          local:
            required: ["links"]
  warnings:
    - - "Severity # violation"
      - "Field # links.0"
      - "Need path # IMPL_1"
      - "Schema path # extra_links > schema > properties > links > items > pattern"
      - "Schema message # 'SPEC_1' does not match '^[A-Z0-9_]{10,}'"
      - sphinx8: ["sn_schema.extra_link_fail"]

