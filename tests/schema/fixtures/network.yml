schemas_in_conf:
  conf: |
    extensions = ["sphinx_needs"]
    needs_from_toml = "ubproject.toml"
    needs_schemas = {
      "schemas": [
        {
          "select": {
            "properties": {
              "type": {"const": "impl"}
            }
          },
          "validate": {
            "network": {
              "links": {
                "minItems": 1
              }
            }
          }
        }
      ]
    }
  ubproject: |
    [[needs.extra_options]]
    name = "asil"
  rst: |
    .. spec:: title
        :id: SPEC_1

    .. impl:: title
        :id: IMPL_1
        :links: SPEC_1
  warnings: []

